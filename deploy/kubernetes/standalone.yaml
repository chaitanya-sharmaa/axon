apiVersion: apps/v1
kind: Deployment
metadata:
  name: axon-proxy
  labels:
    app: axon-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axon-proxy
  template:
    metadata:
      labels:
        app: axon-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: axon-bridge
        image: axon-bridge:latest # Replace with your registry image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: AXON_MEMORY_TYPE
          value: "redis" # Use Redis for multi-replica state sync
        - name: AXON_REDIS_URL
          value: "redis://axon-redis:6379/0"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: axon-secrets
              key: openai-api-key
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: axon-proxy
spec:
  selector:
    app: axon-proxy
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
