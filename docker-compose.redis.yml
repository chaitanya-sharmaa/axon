services:
  axon:
    build: .
    ports:
      - "8080:8080"
    environment:
      AXON_HOST: "0.0.0.0"
      AXON_LOG_FORMAT: "json"
      AXON_MEMORY_TYPE: "redis"
      AXON_REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
